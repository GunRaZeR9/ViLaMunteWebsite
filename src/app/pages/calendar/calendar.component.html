<div class="py-12 bg-white">
  <div class="container max-w-2xl">
    <h1 class="text-4xl font-bold text-center mb-12 text-stone-900">
      {{ 'calendar.title' | translate }}
    </h1>

    <div class="bg-white p-8 rounded-lg shadow-md border border-stone-200">
      <!-- Month Navigation -->
      <div class="flex justify-between items-center mb-6">
        <button (click)="previousMonth()" class="px-4 py-2 bg-forest text-white rounded hover:bg-forest-light transition">
          ← Previous
        </button>
        <h2 class="text-2xl font-bold text-stone-900">{{ monthName }}</h2>
        <button (click)="nextMonth()" class="px-4 py-2 bg-forest text-white rounded hover:bg-forest-light transition">
          Next →
        </button>
      </div>

      <!-- Calendar Grid -->
      <div class="grid grid-cols-7 gap-2 mb-6">
        <div *ngFor="let day of ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']" class="text-center font-semibold text-forest py-2">
          {{ day }}
        </div>
        <div *ngFor="let day of calendarDays"
             [class]="'p-2 text-center rounded ' + (day === null ? 'bg-gray-100' : (isDateBlocked(day!) ? 'bg-red-200 text-red-700 font-semibold' : 'bg-green-100 text-green-700'))"
             >
          {{ day }}
        </div>
      </div>

      <!-- Legend -->
      <div class="flex gap-4 justify-center mb-6 text-sm">
        <div class="flex items-center gap-2">
          <span class="w-4 h-4 bg-green-100 border border-green-700 rounded"></span>
          <span>{{ 'calendar.available' | translate }}</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-4 h-4 bg-red-200 border border-red-700 rounded"></span>
          <span>{{ 'calendar.blocked' | translate }}</span>
        </div>
      </div>

      <!-- CTA Button -->
      <div class="text-center">
        <a href="/contact" class="inline-block px-8 py-3 bg-forest text-white font-semibold rounded-lg hover:bg-forest-light transition">
          {{ 'calendar.ctaText' | translate }}
        </a>
      </div>
    </div>
  </div>
</div>
