name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --configuration production --base-href=/ViLaMunteWebsite/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/vilamunte/browser/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
