<div class="hero">
  <img [src]="imageUrl" alt="Viila Munte Hero" class="hero__image" fetchpriority="high" width="1920" height="1080" />
  <div class="hero__overlay">
    <h1 class="hero__title">{{ title }}</h1>
    <p class="hero__subtitle">{{ subtitle }}</p>
    @if (showCta) {
      <button class="btn btn--primary hero__cta">
        {{ 'home.cta' | translate }}
      </button>
    }
  </div>
</div>
