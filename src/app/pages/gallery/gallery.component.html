<div class="py-12 bg-white">
  <div class="container">
    <h1 class="text-4xl font-bold text-center mb-12 text-stone-900">
      {{ 'gallery.title' | translate }}
    </h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div *ngFor="let image of images" (click)="openLightbox(image)" class="cursor-pointer overflow-hidden rounded-lg shadow-md hover:shadow-lg transition transform hover:scale-105">
        <img [src]="image" alt="Gallery" class="w-full h-48 object-cover" />
      </div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div *ngIf="selectedImage" (click)="closeLightbox()" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
  <div (click)="$event.stopPropagation()" class="relative max-w-4xl w-full">
    <img [src]="selectedImage" alt="Lightbox" class="w-full rounded-lg" />
    <button (click)="closeLightbox()" class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300 transition">
      ✕
    </button>
  </div>
</div>
