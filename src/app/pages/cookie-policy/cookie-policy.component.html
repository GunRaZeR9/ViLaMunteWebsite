<div class="legal-page">
  <div class="container legal-page__container">
    <h1 class="legal-page__title">{{ 'legal.cookies.title' | translate }}</h1>

    @for (n of sectionKeys; track n) {
      <section class="legal-page__chapter">
        <h2 class="legal-page__chapter-title">{{ 'legal.cookies.s' + n + '.title' | translate }}</h2>
        <p class="legal-page__chapter-text">{{ 'legal.cookies.s' + n + '.text' | translate }}</p>
      </section>
    }
  </div>
</div>
