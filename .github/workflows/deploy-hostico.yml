name: Deploy to Hostico

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --base-href=/

      - name: Add .cpanel.yml to build output
        run: |
          cat > dist/vilamunte/browser/.cpanel.yml << 'EOF'
          ---
          deployment:
            tasks:
              - export DEPLOYPATH=/home/vilamunte/public_html/
              - /usr/bin/rsync -a --delete --exclude='.git' --exclude='.cpanel.yml' . $DEPLOYPATH/
          EOF

      - name: Push to hostico-prod branch
        run: |
          cd dist/vilamunte/browser
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M UTC') [${GITHUB_SHA::7}]"
          git push --force \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            HEAD:hostico-prod
