<section class="py-12 bg-stone-50">
  <div class="container">
    <h2 class="text-3xl font-bold text-center mb-8 text-stone-900">
      {{ 'home.reviews_title' | translate }}
    </h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let review of reviews" class="bg-white p-6 rounded-xl shadow-sm border border-stone-200 hover:shadow-md transition">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h3 class="font-semibold text-stone-900">{{ review.author }}</h3>
            <p class="text-sm text-stone-500">{{ review.date | date: 'short' }}</p>
          </div>
          <div class="flex gap-1">
            <span *ngFor="let star of getRating(review.rating)" class="text-yellow-400">
              ★
            </span>
            <span *ngFor="let star of getRating(5 - review.rating)" class="text-stone-300">
              ★
            </span>
          </div>
        </div>
        <p class="text-stone-700 text-sm">{{ getReviewText(review) }}</p>
      </div>
    </div>
  </div>
</section>
