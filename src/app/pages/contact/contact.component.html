<div class="py-12 bg-white">
  <div class="container">
    <h1 class="text-4xl font-bold text-center mb-12 text-stone-900">
      {{ 'contact.title' | translate }}
    </h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-12">
      <!-- Contact Info -->
      <div class="space-y-6">
        <div class="bg-white p-6 rounded-lg border border-stone-200">
          <h3 class="text-xl font-semibold text-stone-900 mb-2">📍 Locație</h3>
          <p class="text-stone-700">{{ 'contact.address' | translate }}</p>
        </div>

        <div class="bg-white p-6 rounded-lg border border-stone-200">
          <h3 class="text-xl font-semibold text-stone-900 mb-2">📞 Telefon</h3>
          <a href="tel:+40XXXXXXXXX" class="text-forest hover:text-forest-light transition font-semibold">
            {{ 'contact.phone' | translate }}
          </a>
        </div>

        <div class="bg-white p-6 rounded-lg border border-stone-200">
          <h3 class="text-xl font-semibold text-stone-900 mb-2">✉️ Email</h3>
          <a href="mailto:contact@viilamunte.ro" class="text-forest hover:text-forest-light transition font-semibold">
            {{ 'contact.email' | translate }}
          </a>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="bg-white p-8 rounded-lg shadow-md border border-stone-200">
        <h2 class="text-2xl font-bold text-stone-900 mb-6">{{ 'contact.formTitle' | translate }}</h2>
        <form (ngSubmit)="submitForm()" #contactForm="ngForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-stone-800 mb-2">{{ 'contact.name' | translate }}</label>
            <input [(ngModel)]="name" name="name" type="text" required
                   class="w-full px-4 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-forest transition" />
          </div>

          <div>
            <label class="block text-sm font-semibold text-stone-800 mb-2">{{ 'contact.email_field' | translate }}</label>
            <input [(ngModel)]="email" name="email" type="email" required
                   class="w-full px-4 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-forest transition" />
          </div>

          <div>
            <label class="block text-sm font-semibold text-stone-800 mb-2">{{ 'contact.message' | translate }}</label>
            <textarea [(ngModel)]="message" name="message" rows="5" required
                      class="w-full px-4 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-forest transition"></textarea>
          </div>

          <button type="submit" [disabled]="!contactForm.valid"
                  class="w-full px-6 py-3 bg-forest text-white font-semibold rounded-lg hover:bg-forest-light transition disabled:opacity-50">
            {{ 'contact.send' | translate }}
          </button>
        </form>
      </div>
    </div>

    <!-- Map -->
    <div class="mt-12">
      <h2 class="text-2xl font-bold text-stone-900 mb-6">{{ 'contact.mapTitle' | translate }}</h2>
      <iframe [src]="mapUrl" width="100%" height="400" frameborder="0" loading="lazy" style="border-radius: 8px;"></iframe>
    </div>
  </div>
</div>
