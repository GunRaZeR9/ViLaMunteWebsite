name: Deploy to Hostico

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --base-href=/

      - name: Add .cpanel.yml to build output
        run: |
          cat > dist/vilamunte/browser/.cpanel.yml << 'EOF'
          ---
          deployment:
            tasks:
              - export DEPLOYPATH=/home/vilamunte/public_html/
              - /usr/bin/rsync -a --delete --exclude='.git' --exclude='.cpanel.yml' . $DEPLOYPATH/
          EOF

      - name: Push to hostico-prod branch
        run: |
          cd dist/vilamunte/browser
          git init -b hostico-prod
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A
          TREE=$(git write-tree)
          MESSAGE="deploy: $(date -u '+%Y-%m-%d %H:%M UTC') [${GITHUB_SHA::7}]"
          if git fetch origin hostico-prod --depth=1 2>/dev/null; then
            COMMIT=$(git commit-tree "$TREE" -p FETCH_HEAD -m "$MESSAGE")
          else
            COMMIT=$(git commit-tree "$TREE" -m "$MESSAGE")
          fi
          git update-ref refs/heads/hostico-prod "$COMMIT"
          git push origin hostico-prod
