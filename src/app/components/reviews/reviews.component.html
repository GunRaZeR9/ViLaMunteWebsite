<section class="reviews-section">
  <div class="container">
    <h2 class="reviews-section__title">
      {{ 'home.reviews_title' | translate }}
    </h2>
    <div class="reviews-section__grid">
      @for (review of reviews; track review.author) {
        <div class="review-card">
          <div class="review-card__header">
            <div class="review-card__author">
              <h3 class="review-card__name">{{ review.author }}</h3>
              <p class="review-card__date">{{ review.date | date: 'short' }}</p>
            </div>
            <div class="review-card__stars">
              @for (star of getRating(review.rating); track $index) {
                <span class="star" [class.star--filled]="star === 1" [class.star--empty]="star === 0">★</span>
              }
            </div>
          </div>
          <p class="review-card__text">{{ getReviewText(review) }}</p>
        </div>
      }
    </div>
  </div>
</section>
