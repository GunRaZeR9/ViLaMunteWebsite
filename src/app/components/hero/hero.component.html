<div class="relative w-full h-96 md:h-screen overflow-hidden">
  <img [src]="imageUrl" alt="Casa Cifu Hero" class="w-full h-full object-cover" />
  <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/50 to-black/20 flex flex-col justify-center items-center text-center text-white px-4">
    <h1 class="text-4xl md:text-6xl font-bold mb-4 font-serif text-white drop-shadow-lg">{{ title }}</h1>
    <p class="text-xl md:text-2xl mb-8 text-white drop-shadow-lg">{{ subtitle }}</p>
    <button *ngIf="showCta" class="px-8 py-3 bg-forest hover:bg-forest-light transition rounded-lg font-semibold">
      {{ 'home.cta' | translate }}
    </button>
  </div>
</div>
